apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RobDaPraia/hello-world-argo
    targetRevision: main
    path: argo-templates/k8s-web
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-web
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
